id = "xcode"
name = "Xcode"
description = "Cleanup profile for Xcode generated developer artifacts."
platform = "macos"

[[categories]]
id = "derived-data"
name = "DerivedData"
path = "~/Library/Developer/Xcode/DerivedData"
description = "Build products, indexes, and transient caches generated by Xcode."
safety = "rebuildable"
recommendation = "Usually safe to clean when reclaiming disk space."
impact = "Builds and indexes may need to regenerate on the next open or compile."

[[categories]]
id = "device-support"
name = "iOS DeviceSupport"
path = "~/Library/Developer/Xcode/iOS DeviceSupport"
description = "Device support files downloaded for attached iOS devices."
safety = "caution"
recommendation = "Clean selectively if you no longer debug against older device OS versions."
impact = "Xcode may need to re-download support files before reconnecting some devices."

[[categories]]
id = "archives"
name = "Archives"
path = "~/Library/Developer/Xcode/Archives"
description = "Organizer archives kept for app distribution, debugging, and symbolication."
safety = "caution"
recommendation = "Review before cleaning because some archives may still be useful for releases."
impact = "Removing archives can make it harder to re-export or inspect historical builds."

[[categories]]
id = "core-simulator-caches"
name = "CoreSimulator Caches"
path = "~/Library/Developer/CoreSimulator/Caches"
description = "Derived simulator cache data created by CoreSimulator services."
safety = "rebuildable"
recommendation = "Usually safe to clean when simulator caches grow large."
impact = "Simulators may take longer to warm up while caches are recreated."

[[rules]]
match = "ModuleCache.noindex"
type = "exact"
safety = "rebuildable"
description = "Swift and Clang module cache produced during project builds."
recommendation = "Safe to remove when reclaiming space or troubleshooting stale build state."
impact = "Modules will be rebuilt as needed by future compiles."

[[rules]]
match = "CompilationCache.noindex"
type = "exact"
safety = "rebuildable"
description = "Compilation cache used by Xcode to accelerate repeated builds."
recommendation = "Safe to remove when you want a clean rebuild of cached compiler output."
impact = "Build times may increase temporarily until the cache is repopulated."

[[rules]]
match = "SDKStatCaches.noindex"
type = "exact"
safety = "rebuildable"
description = "SDK statistics caches created while indexing and compiling against Apple SDKs."
recommendation = "Safe to remove when reclaiming space from derived SDK cache data."
impact = "Xcode will recreate the cache files the next time they are needed."

[[rules]]
match = "SymbolCache.noindex"
type = "exact"
safety = "rebuildable"
description = "Cached symbol lookup data used to speed up debugging and indexing."
recommendation = "Safe to remove if cache growth is large or symbol data looks stale."
impact = "Debugger and index symbol caches may need to regenerate."

[[rules]]
match = "Unsaved_Xcode_Document_*"
type = "glob"
safety = "recommended"
description = "Transient recovery documents left behind by unsaved Xcode editor sessions."
recommendation = "Recommended cleanup candidate when the documents are clearly stale."
impact = "Unsaved draft recovery content for those sessions will no longer be available."
