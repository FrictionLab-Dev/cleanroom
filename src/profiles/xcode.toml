id = "xcode"
name = "Xcode"
description = "Scan-first cleanup profile for Xcode developer storage."
platform = "macos"

[[categories]]
id = "derived-data"
name = "Derived Data"
path = "~/Library/Developer/Xcode/DerivedData"
description = "Build products, indexes, module caches, and other rebuildable output from local Xcode builds."
safety = "high-confidence"
default_cleanup = true
cleanup_kind = "safe-cleanup-candidate"
reversible = true
move_to_trash = true
recommendation = "Safe cleanup candidate when you want to reclaim space or clear stale build state."
impact = "Xcode rebuilds these artifacts on the next open, index, or compile."

[[categories]]
id = "archives"
name = "Archives"
path = "~/Library/Developer/Xcode/Archives"
description = "Organizer archives kept for distribution, debugging, symbolication, and release history."
safety = "high-caution"
default_cleanup = false
cleanup_kind = "keep-by-default"
reversible = true
move_to_trash = true
caution = "Archives can still be needed for re-exporting releases or debugging shipped builds."
recommendation = "Keep by default and review individual archives before moving anything to Trash."
impact = "Removing archives can make historical builds harder to inspect, export, or symbolicate."

[[categories]]
id = "device-support"
name = "Device Support"
path = "~/Library/Developer/Xcode/* DeviceSupport"
description = "Downloaded support files for attached iOS, watchOS, and tvOS devices."
safety = "high-caution"
default_cleanup = false
cleanup_kind = "keep-by-default"
reversible = true
move_to_trash = true
caution = "Xcode may need to re-download support files before it can debug or mount older device OS versions."
recommendation = "Keep by default unless you know you no longer need older platform support files."
impact = "Removing support files can delay the next device connection while Xcode downloads them again."

[[categories]]
id = "swiftui-previews"
name = "SwiftUI Previews"
path = "~/Library/Developer/Xcode/UserData/Previews"
description = "Generated preview render caches used by SwiftUI canvas previews."
safety = "high-confidence"
default_cleanup = true
cleanup_kind = "safe-cleanup-candidate"
reversible = true
move_to_trash = true
recommendation = "Safe cleanup candidate when preview caches have grown large or previews look stale."
impact = "SwiftUI previews may take longer on the next load while caches are rebuilt."

[[categories]]
id = "products"
name = "Products"
path = "~/Library/Developer/Xcode/Products"
description = "Generated build products Xcode may keep outside project folders for reuse."
safety = "medium-confidence"
default_cleanup = false
cleanup_kind = "review-carefully"
reversible = true
move_to_trash = true
caution = "Some products may still be useful for local testing or ad hoc packaging."
recommendation = "Review carefully before cleanup, especially if you rely on preserved local build outputs."
impact = "Xcode can rebuild products, but local build outputs may need to be regenerated."

[[categories]]
id = "documentation-cache"
name = "Documentation Cache"
path = "~/Library/Developer/Xcode/DocumentationCache"
description = "Cached documentation content downloaded or generated for developer documentation browsing."
safety = "high-confidence"
default_cleanup = true
cleanup_kind = "safe-cleanup-candidate"
reversible = true
move_to_trash = true
recommendation = "Safe cleanup candidate when reclaiming disk space from stale documentation caches."
impact = "Documentation pages may reload or redownload the next time they are opened."

[[categories]]
id = "test-logs"
name = "Test Logs"
path = "~/Library/Developer/Xcode/DerivedData/**/Logs/Test"
description = "Per-project test logs written under DerivedData."
safety = "high-confidence"
default_cleanup = true
cleanup_kind = "safe-cleanup-candidate"
reversible = true
move_to_trash = true
recommendation = "Safe cleanup candidate after you no longer need older local test logs."
impact = "Old local test logs disappear, but future test runs generate new logs."

[[categories]]
id = "result-bundles"
name = "Result Bundles"
path = "~/Library/Developer/Xcode/DerivedData/**/*.xcresult"
description = "Xcode test and build result bundles that can consume substantial disk space."
safety = "high-confidence"
default_cleanup = true
cleanup_kind = "safe-cleanup-candidate"
reversible = true
move_to_trash = true
recommendation = "Safe cleanup candidate when you no longer need older local result bundles."
impact = "Historical local result bundles will no longer be available for review."

[[categories]]
id = "temporary-xcode-build-folders"
name = "Temporary Xcode Build Folders"
path = "/private/tmp (xcodebuild-* and TemporaryItems Xcode artifacts only)"
description = "Temporary Xcode build and test artifacts found in bounded /private/tmp patterns."
safety = "medium-confidence"
default_cleanup = false
cleanup_kind = "review-carefully"
reversible = true
move_to_trash = true
caution = "Only tightly matched Xcode-related temp artifacts should appear here."
recommendation = "Review carefully before cleanup; this category intentionally avoids broad temporary-file scanning."
impact = "In-progress command-line builds or tests may lose temporary intermediates if cleaned too early."

[[rules]]
match = "ModuleCache.noindex"
type = "exact"
safety = "rebuildable"
description = "Swift and Clang module cache produced during project builds."
recommendation = "Safe to remove when reclaiming space or troubleshooting stale build state."
impact = "Modules will be rebuilt as needed by future compiles."

[[rules]]
match = "CompilationCache.noindex"
type = "exact"
safety = "rebuildable"
description = "Compilation cache used by Xcode to accelerate repeated builds."
recommendation = "Safe to remove when you want a clean rebuild of cached compiler output."
impact = "Build times may increase temporarily until the cache is repopulated."

[[rules]]
match = "SDKStatCaches.noindex"
type = "exact"
safety = "rebuildable"
description = "SDK statistics caches created while indexing and compiling against Apple SDKs."
recommendation = "Safe to remove when reclaiming space from derived SDK cache data."
impact = "Xcode will recreate the cache files the next time they are needed."

[[rules]]
match = "SymbolCache.noindex"
type = "exact"
safety = "rebuildable"
description = "Cached symbol lookup data used to speed up debugging and indexing."
recommendation = "Safe to remove if cache growth is large or symbol data looks stale."
impact = "Debugger and index symbol caches may need to regenerate."

[[rules]]
match = "Unsaved_Xcode_Document_*"
type = "glob"
safety = "recommended"
description = "Transient recovery documents left behind by unsaved Xcode editor sessions."
recommendation = "Recommended cleanup candidate when the documents are clearly stale."
impact = "Unsaved draft recovery content for those sessions will no longer be available."

[[rules]]
match = "*.xcresult"
type = "glob"
safety = "recommended"
description = "Historical Xcode result bundle from a local build or test run."
recommendation = "Recommended cleanup candidate when you no longer need the saved result bundle."
impact = "That local result bundle will no longer be available in Xcode or Finder."
